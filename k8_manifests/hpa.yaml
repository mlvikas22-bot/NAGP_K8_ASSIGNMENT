apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: employee-api-hpa
  namespace: nagp

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: employee-api

  minReplicas: 4
  maxReplicas: 10

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70
